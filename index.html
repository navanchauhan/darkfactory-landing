<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07120d" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="index, follow" />
    <meta name="application-name" content="Dark Factory" />
    <meta name="author" content="Dark Factory" />
    <meta
      name="description"
      content="Dark Factory. Industry, made sacred. A catalyst for impossible things."
    />
    <title>Dark Factory</title>
    <link rel="canonical" href="https://darkfactoryinc.com/" />
    <meta property="og:site_name" content="Dark Factory" />
    <meta property="og:title" content="Dark Factory" />
    <meta
      property="og:description"
      content="Industry, made sacred. A catalyst for impossible things."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://darkfactoryinc.com/" />
    <meta property="og:image" content="https://darkfactoryinc.com/assets/og-image.jpeg" />
    <meta property="og:image:secure_url" content="https://darkfactoryinc.com/assets/og-image.jpeg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Dark Factory industrial mountain manufactory with the words Industry, made sacred."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dark Factory" />
    <meta
      name="twitter:description"
      content="Industry, made sacred. A catalyst for impossible things."
    />
    <meta name="twitter:image" content="https://darkfactoryinc.com/assets/og-image.jpeg" />
    <meta
      name="twitter:image:alt"
      content="Dark Factory industrial mountain manufactory with the words Industry, made sacred."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #07120d;
        --bg-deep: #030806;
        --ink: #f4ead6;
        --muted: #d8c7a6;
        --gold: #8c743d;
        --gold-soft: rgba(177, 145, 75, 0.62);
        --gold-faint: rgba(177, 145, 75, 0.26);
        --shadow: rgba(0, 0, 0, 0.52);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg-deep);
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Cormorant Garamond", Georgia, serif;
        background:
          radial-gradient(circle at 48% 8%, rgba(138, 111, 58, 0.12), transparent 34rem),
          radial-gradient(circle at 18% 78%, rgba(87, 112, 70, 0.16), transparent 30rem),
          linear-gradient(135deg, rgba(255, 255, 255, 0.035), transparent 32%),
          var(--bg);
        overflow-x: hidden;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        content: "";
        opacity: 0.44;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px);
        background-size: 3px 3px, 5px 5px;
        mix-blend-mode: soft-light;
      }

      body::after {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        content: "";
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.56), transparent 28%, transparent 72%, rgba(0, 0, 0, 0.62)),
          linear-gradient(180deg, rgba(0, 0, 0, 0.18), transparent 46%, rgba(0, 0, 0, 0.45));
      }

      .page {
        position: relative;
        isolation: isolate;
        min-height: 100svh;
        padding: clamp(1.1rem, 2vw, 2rem);
      }

      .frame {
        position: relative;
        display: grid;
        min-height: calc(100svh - clamp(2.2rem, 4vw, 4rem));
        padding: clamp(1.5rem, 3vw, 3rem);
        border: 1px solid var(--gold-faint);
      }

      .frame::before,
      .frame::after {
        position: absolute;
        z-index: -1;
        width: clamp(5.5rem, 11vw, 10rem);
        height: clamp(5.5rem, 11vw, 10rem);
        pointer-events: none;
        content: "";
        border: 1px solid var(--gold-soft);
        opacity: 0.58;
      }

      .frame::before {
        top: -1px;
        left: -1px;
        border-right: 0;
        border-bottom: 0;
        border-radius: 0 0 100% 0;
      }

      .frame::after {
        right: -1px;
        bottom: -1px;
        border-top: 0;
        border-left: 0;
        border-radius: 100% 0 0 0;
      }

      .corner {
        position: absolute;
        width: clamp(2.6rem, 5vw, 4.6rem);
        height: clamp(2.6rem, 5vw, 4.6rem);
        pointer-events: none;
        opacity: 0.72;
      }

      .corner::before,
      .corner::after {
        position: absolute;
        content: "";
        border: 1px solid var(--gold-soft);
      }

      .corner::before {
        inset: 0;
        border-radius: 0 0 100% 0;
        border-right: 0;
        border-bottom: 0;
      }

      .corner::after {
        top: 18%;
        left: 18%;
        width: 55%;
        height: 55%;
        border-radius: 50%;
        border-right: 0;
        border-bottom: 0;
        transform: rotate(-22deg);
      }

      .corner--tl {
        top: -0.15rem;
        left: -0.15rem;
      }

      .corner--tr {
        top: -0.15rem;
        right: -0.15rem;
        transform: rotate(90deg);
      }

      .corner--bl {
        bottom: -0.15rem;
        left: -0.15rem;
        transform: rotate(-90deg);
      }

      .corner--br {
        right: -0.15rem;
        bottom: -0.15rem;
        transform: rotate(180deg);
      }

      .brand {
        position: relative;
        z-index: 3;
        align-self: start;
        justify-self: center;
        margin: 0;
        width: clamp(15rem, 29vw, 28rem);
        filter: drop-shadow(0 0.12rem 0.55rem rgba(0, 0, 0, 0.42));
      }

      .brand img {
        display: block;
        width: 100%;
        height: auto;
      }

      .hero {
        position: relative;
        display: grid;
        grid-template-columns:
          minmax(1.5rem, 0.7fr)
          minmax(18rem, 30rem)
          minmax(17rem, 0.72fr);
        align-items: end;
        gap: clamp(1rem, 3vw, 3.5rem);
        width: min(100%, 92rem);
        margin: clamp(1.4rem, 3vw, 2.5rem) auto 0;
      }

      .art-panel {
        position: relative;
        grid-column: 2;
        align-self: center;
        justify-self: center;
        aspect-ratio: 0.66;
        width: 100%;
        max-width: min(30rem, 34vw);
        min-height: 0;
        margin: 0;
        overflow: hidden;
        border: 1px solid rgba(158, 130, 65, 0.62);
        box-shadow:
          0 1.8rem 5rem var(--shadow),
          inset 0 0 0 1px rgba(244, 234, 214, 0.08);
      }

      .art-panel::before,
      .art-panel::after {
        position: absolute;
        z-index: 2;
        width: 5.5rem;
        height: 5.5rem;
        content: "";
        border: 1px solid var(--gold-soft);
        opacity: 0.8;
      }

      .art-panel::before {
        top: -1px;
        left: -1px;
        border-right: 0;
        border-bottom: 0;
        border-radius: 0 0 100% 0;
      }

      .art-panel::after {
        right: -1px;
        bottom: -1px;
        border-top: 0;
        border-left: 0;
        border-radius: 100% 0 0 0;
      }

      .art-panel img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(0.9) contrast(1.04) brightness(0.9);
        transform: scale(1.02);
      }

      .art-panel .veil {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(5, 12, 8, 0) 42%, rgba(5, 12, 8, 0.46) 100%),
          radial-gradient(circle at 54% 33%, transparent 0 38%, rgba(3, 8, 6, 0.2) 72%);
      }

      .headline {
        position: absolute;
        z-index: 4;
        right: clamp(0.2rem, 4vw, 3rem);
        bottom: clamp(7.8rem, 15vw, 14rem);
        left: 0;
        margin: 0;
        color: var(--ink);
        font-size: clamp(6rem, 11.6vw, 14.4rem);
        font-weight: 500;
        line-height: 0.78;
        letter-spacing: 0;
        text-shadow:
          0 0.2rem 0.1rem rgba(255, 255, 255, 0.08),
          0 1.2rem 2.4rem rgba(0, 0, 0, 0.48);
      }

      .headline span {
        display: block;
      }

      .headline span:nth-child(1) {
        transform: translateX(-0.2rem);
      }

      .headline span:nth-child(2),
      .headline span:nth-child(3) {
        text-align: right;
      }

      .statement {
        position: relative;
        z-index: 5;
        grid-column: 3;
        align-self: end;
        width: min(100%, 24rem);
        margin: 0 0 clamp(2rem, 5vw, 5rem);
        color: var(--muted);
        font-size: clamp(1.45rem, 2vw, 2.25rem);
        font-weight: 500;
        line-height: 1.16;
        text-shadow: 0 0.8rem 1.4rem rgba(0, 0, 0, 0.56);
      }

      .statement::before {
        display: block;
        width: clamp(9rem, 14vw, 13.5rem);
        height: 1px;
        margin: 0 0 clamp(1.2rem, 2.4vw, 2rem);
        content: "";
        background:
          linear-gradient(90deg, var(--gold-soft), var(--gold-soft)),
          radial-gradient(circle, var(--gold) 0 0.22rem, transparent 0.24rem);
        background-repeat: no-repeat;
        background-position: center, center;
        box-shadow: 0 0 0 0.18rem rgba(7, 18, 13, 0.9);
      }

      .rule {
        position: absolute;
        top: clamp(5.8rem, 8vw, 8rem);
        left: 50%;
        z-index: 1;
        width: min(34rem, 42vw);
        height: 1px;
        content: "";
        background: linear-gradient(90deg, transparent, var(--gold-soft), transparent);
        transform: translateX(-50%);
      }

      @media (max-width: 980px) {
        .frame {
          min-height: calc(100svh - 2.2rem);
          padding: clamp(1.2rem, 4vw, 2rem);
        }

        .hero {
          grid-template-columns: 1fr;
          width: min(100%, 46rem);
          margin-top: clamp(1.5rem, 5vw, 3rem);
        }

        .art-panel {
          grid-column: 1;
          width: 100%;
          max-width: none;
          min-height: 0;
        }

        .headline {
          right: auto;
          bottom: clamp(7rem, 17vw, 10rem);
          left: clamp(1.1rem, 5vw, 2.2rem);
          width: min-content;
          font-size: clamp(5.2rem, 19vw, 8.8rem);
          line-height: 0.82;
        }

        .headline span:nth-child(2),
        .headline span:nth-child(3) {
          text-align: left;
        }

        .statement {
          grid-column: 1;
          width: min(100%, 28rem);
          margin: clamp(1.7rem, 6vw, 2.8rem) 0 0 clamp(0.7rem, 3vw, 1.3rem);
          font-size: clamp(1.65rem, 6vw, 2.45rem);
        }

        .rule {
          display: none;
        }
      }

      @media (max-width: 620px) {
        .page {
          padding: 0.75rem;
        }

        .frame {
          padding: clamp(1.1rem, 4vw, 1.4rem);
        }

        .brand {
          justify-self: start;
          margin-left: 0.55rem;
          width: clamp(13.5rem, 68vw, 18rem);
        }

        .hero {
          margin-top: 1.15rem;
        }

        .art-panel {
          min-height: 28rem;
          max-height: 54rem;
        }

        .art-panel img {
          object-position: 51% 32%;
        }

        .headline {
          top: clamp(21.5rem, 94vw, 23rem);
          bottom: auto;
          left: clamp(0.9rem, 4vw, 1.4rem);
          font-size: clamp(4.8rem, 21vw, 7.2rem);
        }

        .statement {
          margin-left: 0.55rem;
          padding-bottom: 0.9rem;
        }
      }

      @media (max-width: 390px) {
        .headline {
          font-size: clamp(4.3rem, 20vw, 5.2rem);
        }

        .statement {
          font-size: 1.55rem;
          margin-top: 3.6rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page" aria-labelledby="page-title">
      <section class="frame" aria-label="Dark Factory landing page">
        <i class="corner corner--tl" aria-hidden="true"></i>
        <i class="corner corner--tr" aria-hidden="true"></i>
        <i class="corner corner--bl" aria-hidden="true"></i>
        <i class="corner corner--br" aria-hidden="true"></i>
        <div class="rule" aria-hidden="true"></div>

        <p class="brand">
          <img src="assets/dark-factory-wordmark.png" alt="Dark Factory" />
        </p>

        <div class="hero">
          <figure class="art-panel">
            <img
              src="assets/dark-factory-hero.jpeg"
              alt="A dark mountain manufactory glowing with amber light beneath smoke and cliffs."
            />
            <span class="veil" aria-hidden="true"></span>
          </figure>

          <h1 id="page-title" class="headline" aria-label="Industry, made sacred.">
            <span>Industry,</span>
            <span>made</span>
            <span>sacred.</span>
          </h1>

          <p class="statement">A catalyst for impossible things.</p>
        </div>
      </section>
    </main>
  </body>
</html>
